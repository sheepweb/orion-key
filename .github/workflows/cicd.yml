# ===================================================================
# Orion Key CI/CD 工作流
# ===================================================================
#
# 流程：push 到 prod 分支 → 云端构建两个 Docker 镜像 → 推送 GHCR → 服务器拉取并重启
#
# 镜像构建方式：
#   后端 (Java):  Jib Maven 插件直接产出 Docker 镜像（无需 Dockerfile）
#   前端 (Next.js): 标准 Dockerfile 多阶段构建
#
# 兼容国内服务器无法连接github不稳定导致的git clone 大量数据时超时
# ===================================================================

name: Orion Key CI/CD

# ── 触发条件 ──
on:
  push:
    branches: [prod]        # push 到 prod 分支时触发
    tags: ['v*']            # push tag（如 v1.0.0）时触发
  workflow_dispatch:         # 支持在 GitHub Actions 页面手动触发
    inputs:
      image_tag:
        description: '镜像标签（留空自动生成）'
        required: false
        type: string

# 全局权限：最小权限原则
permissions:
  contents: read

jobs:
  # ════════════════════════════════════════════════════════════════
  # Job 1: 构建并推送镜像（在 GitHub 云端 runner 上执行）
  # ════════════════════════════════════════════════════════════════
  build-and-push:
    runs-on: ubuntu-latest      # 使用 GitHub 提供的云端 Ubuntu 机器
    permissions:
      contents: read
      packages: write           # 推送 GHCR 镜像需要 write 权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven          # 缓存 Maven 依赖，加速后续构建

      # 计算镜像标签：手动输入 > git tag > commit SHA 前 7 位
      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${GITHUB_SHA::7}"
          fi
          # Docker 镜像名要求全小写
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$TAG"                                                >> "$GITHUB_OUTPUT"
          echo "api_image=ghcr.io/$OWNER/orion-key-api:$TAG"            >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/$OWNER/orion-key-web:$TAG"            >> "$GITHUB_OUTPUT"

      # ── 后端镜像：Jib 构建（无需 Docker daemon，无需 Dockerfile）──
      - name: Build & Push API image (Jib)
        working-directory: apps/api
        run: |
          mvn -B -DskipTests \
            -Djib.to.image="${{ steps.meta.outputs.api_image }}" \
            -Djib.to.auth.username="${{ github.actor }}" \
            -Djib.to.auth.password="${{ secrets.GITHUB_TOKEN }}" \
            compile jib:build

      # ── 前端镜像：Docker 多阶段构建 ──
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Web image
        uses: docker/build-push-action@v6
        with:
          context: .                # 构建上下文 = 仓库根目录（Dockerfile.web 需要 monorepo 配置文件）
          file: ./Dockerfile.web    # 指定 Dockerfile 路径
          push: true
          tags: ${{ steps.meta.outputs.web_image }}

  # ════════════════════════════════════════════════════════════════
  # Job 2: 部署到服务器（在自建 runner 上执行）
  # ════════════════════════════════════════════════════════════════
  deploy:
    needs: [build-and-push]             # 等 Job 1 完成后才执行
    runs-on: [self-hosted, prod]        # 在带有 "prod" 标签的自建 runner 上运行
    permissions:
      contents: read
      packages: read                    # 拉取镜像只需 read 权限

    steps:
      # 注意：此 job 不需要 checkout 代码（避免国内服务器 git clone github.com 超时）
      # docker-compose.yml 已在首次部署时手动放置到 /opt/orion-key/
      # 如果 docker-compose.prod.yml 有变更，手动更新服务器上的文件即可

      # 重新计算镜像标签（与 Job 1 逻辑一致）
      - name: Compute image tag
        id: meta
        shell: bash
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${GITHUB_SHA::7}"
          fi
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$TAG"                                                >> "$GITHUB_OUTPUT"
          echo "api_image=ghcr.io/$OWNER/orion-key-api:$TAG"            >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/$OWNER/orion-key-web:$TAG"            >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # ── 核心部署步骤（Docker Compose）──
      #
      # 流程：
      #   1. 将本次构建的镜像标签写入 .env（Compose 通过 ${API_IMAGE} 变量引用）
      #   2. docker compose pull 拉取最新镜像
      #   3. docker compose up -d 自动停旧容器、启新容器
      #
      # docker-compose.yml 已在首次部署时放置到 /opt/orion-key/，无需每次从仓库复制
      # 如需更新 compose 配置，手动 scp 或编辑服务器上的文件即可
      #
      - name: Deploy with Docker Compose
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_DIR="/opt/orion-key"

          # ① 更新 .env 中的镜像标签
          #    先移除旧的 IMAGE 行，再追加新值
          #    这样 docker-compose.yml 中的 ${API_IMAGE} 和 ${WEB_IMAGE} 就指向本次构建的镜像
          cd "$DEPLOY_DIR"
          sed -i '/^API_IMAGE=/d' .env 2>/dev/null || true
          sed -i '/^WEB_IMAGE=/d' .env 2>/dev/null || true
          echo "API_IMAGE=${{ steps.meta.outputs.api_image }}" >> .env
          echo "WEB_IMAGE=${{ steps.meta.outputs.web_image }}" >> .env

          # ② 拉取最新镜像 + 启动/重建容器
          #    pull:  根据 .env 中的 IMAGE 标签拉取镜像
          #    up -d: 比较当前运行状态与 compose 配置，只重建有变化的容器
          #    --remove-orphans: 清理不再定义的旧容器
          docker compose pull
          docker compose up -d --remove-orphans

          # ③ 验证
          echo "Deployed with tag: ${{ steps.meta.outputs.tag }}"
          docker compose ps
