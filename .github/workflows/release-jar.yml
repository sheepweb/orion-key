name: Release API JAR

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/release-jar.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-jar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Build API jar
        run: mvn -f apps/api/pom.xml -B clean package -DskipTests

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          JAR_PATH=$(find apps/api/target -maxdepth 1 -type f -name '*.jar' ! -name '*.original' | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo 'JAR file not found' >&2
            exit 1
          fi
          JAR_NAME=$(basename "$JAR_PATH")
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_TIME=$(date -u +'%Y%m%d%H%M%S')
          HISTORY_TAG="build-${BUILD_TIME}-${SHORT_SHA}"
          WEB_ARCHIVE="orion-key-web-source-${SHORT_SHA}.tar.gz"
          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"
          echo "jar_name=$JAR_NAME" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "history_tag=$HISTORY_TAG" >> "$GITHUB_OUTPUT"
          echo "web_archive=$WEB_ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Pack web source archive
        shell: bash
        run: |
          set -euo pipefail
          tar -czf "${{ steps.meta.outputs.web_archive }}" \
            apps/web \
            package.json \
            pnpm-lock.yaml \
            pnpm-workspace.yaml

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-latest
          name: Main Latest Build
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: false
          body: |
            Latest auto-built API jar and web source package from `main`.

            Commit: `${{ github.sha }}`
          files: |
            ${{ steps.meta.outputs.jar_path }}
            ${{ steps.meta.outputs.web_archive }}
          append_body: false
          make_latest: false

      - name: Publish history release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.history_tag }}
          name: Build ${{ steps.meta.outputs.short_sha }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: false
          body: |
            Historical auto-built API jar and web source package.

            Commit: `${{ github.sha }}`
          files: |
            ${{ steps.meta.outputs.jar_path }}
            ${{ steps.meta.outputs.web_archive }}
          make_latest: false

      - name: Keep latest 3 history releases
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const history = releases
              .filter(r => !r.draft && r.tag_name && r.tag_name.startsWith('build-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const toDelete = history.slice(3);
            for (const release of toDelete) {
              core.info(`Deleting old release ${release.tag_name}`);
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });
              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `tags/${release.tag_name}`,
                });
              } catch (error) {
                core.warning(`Failed to delete tag ${release.tag_name}: ${error.message}`);
              }
            }

